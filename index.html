<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تسجيل الدخول - عدن نت</title>
    
    <link rel="stylesheet" href="style.min.css">
    <link rel="stylesheet" href="fontello.min.css">
    
    <style>
        /* إضافة بسيطة لضمان ظهور شريط الأخبار بشكل صحيح */
        .marquee {
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login" class="screen">
            <div class="screen-content">
                
                <div class="network-header" style="text-align: center; padding-top: 30px; z-index: 10; position: relative;">
                    <div class="network-prefix" style="color: rgba(255,255,255,0.7); font-size: 18px;">شبكة</div>
                    <div class="network-name" style="color: #fff; font-size: 28px; font-weight: bold;">{{network-name}}</div>
                </div>

                <div class="section" style="margin-top: 20px; text-align: center;">
                    <div class="marquee" style="color: #ffd2a0; font-size: 14px;">{{news-line}}</div>
                </div>

                <form class="login-form" action="{{link-login-only}}" method="post">
                    <input type="hidden" name="dst" value="{{link-orig}}">
                    <input type="hidden" name="popup" value="true">
                    
                    <div class="login-field">
                        <i class="login-icon icon-user"></i>
                        <input type="text" name="username" class="login-input" placeholder="ادخل رمز البطاقة هنا" value="{{username}}" autocomplete="off">
                    </div>

                    <button type="submit" class="login-submit">
                        <span class="button-text">تسجيل الدخول</span>
                        <i class="button-icon icon-right-open"></i>
                    </button>
                </form>

                <div class="social-login">
                    <div class="social-icons" style="display: flex; gap: 20px; justify-content: center; margin-top: 30px;">
                        <div class="price-icon" onclick="window.location.href='#prices'" style="width:60px; height:60px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                            <span style="color:#000; font-size:11px; font-weight:bold;">الاسعار</span>
                        </div>
                        <div class="sell-point-icon" onclick="window.location.href='#points'" style="width:60px; height:60px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                            <span style="color:#000; font-size:11px; font-weight:bold;">نقاط البيع</span>
                        </div>
                    </div>
                </div>

                <div style="position: absolute; bottom: 15px; width: 100%; text-align: center; color: rgba(255,255,255,0.8); font-size: 13px;">
                    خدمة العملاء: {{service-number}}
                </div>
            </div>

            <div class="screen-background">
                <span class="screen-background-shape screen-background-shape4"></span>
                <span class="screen-background-shape screen-background-shape3"></span>		
                <span class="screen-background-shape screen-background-shape2"></span>
                <span class="screen-background-shape screen-background-shape1"></span>
            </div>		
        </div>
    </div>

    <script src="config.js"></script>
    <script src="profiles.js"></script> <script src="sell-points.js"></script> <script src="mus.min.js"></script>
    <script src="hotOptions.min.js"></script>
    <script src="hotCookie.min.js"></script>
    <script src="hotBlocker.min.js"></script>
    <script src="news-line.js"></script>
    <script src="templates.min.js"></script>
    <script src="init.min.js"></script>
    <script src="main.min.js"></script>

</body>
</html>
